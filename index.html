<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zucker-Tracker</title>
    <style>
        :root {
            --primary-color: #ff6b6b;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #333;
            --accent-color: #4dabf7;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            user-select: none;
        }

        .container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 700;
            margin: 0;
            color: #222;
        }

        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .tracker-button {
            background: var(--card-bg);
            border: 1px solid #eee;
            border-radius: 16px;
            padding: 12px 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: transform 0.1s, background-color 0.1s;
            cursor: pointer;
            min-height: 100px;
        }

        .tracker-button:active {
            transform: scale(0.96);
            background-color: #f1f3f5;
        }

        .label {
            font-size: 0.95rem;
            font-weight: 600;
            line-height: 1.2;
            margin-bottom: 4px;
        }

        .grams {
            font-size: 0.8rem;
            color: #888;
            font-weight: 400;
            margin-bottom: 5px;
        }

        .count {
            background: var(--accent-color);
            color: white;
            font-size: 1rem;
            padding: 2px 10px;
            border-radius: 10px;
            font-weight: 700;
            margin-top: 6px;
        }

        .result-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 30px 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            text-align: center;
            margin-top: auto;
            border: 1px solid rgba(0,0,0,0.05);
            width: 100%;
        }

        .total-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #adb5bd;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .total-amount {
            font-size: 4rem;
            font-weight: 800;
            color: var(--primary-color);
            line-height: 1;
        }

        .unit {
            font-size: 1.5rem;
            font-weight: 500;
            color: #adb5bd;
            margin-left: 2px;
        }

        .history-info {
            margin-top: 15px;
            font-size: 0.85rem;
            color: #868e96;
        }

        .reset-link {
            display: inline-block;
            margin-top: 20px;
            color: var(--accent-color);
            font-size: 0.85rem;
            text-decoration: none;
            font-weight: 500;
            background: none;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
        }

        footer {
            margin-top: 25px;
            font-size: 0.75rem;
            color: #ced4da;
            text-align: center;
            padding-bottom: 10px;
        }

        @keyframes bump {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .bump-anim {
            animation: bump 0.2s ease-out;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
        </header>

        <div class="button-grid">
            <button class="tracker-button" onclick="addSugar(5, 'plus5', this)">
                <span class="label">+ 5g</span>
                <span class="grams">Zucker</span>
                <span class="count" id="count-plus5">0x</span>
            </button>
            <button class="tracker-button" onclick="addSugar(10, 'plus10', this)">
                <span class="label">+ 10g</span>
                <span class="grams">Zucker</span>
                <span class="count" id="count-plus10">0x</span>
            </button>
            <button class="tracker-button" onclick="addSugar(15, 'plus15', this)">
                <span class="label">+ 15g</span>
                <span class="grams">Zucker</span>
                <span class="count" id="count-plus15">0x</span>
            </button>
            <button class="tracker-button" onclick="addSugar(20, 'plus20', this)">
                <span class="label">+ 20g</span>
                <span class="grams">Zucker</span>
                <span class="count" id="count-plus20">0x</span>
            </button>
        </div>

        <div class="result-card">
            <div class="total-label">Aktueller Stand</div>
            <div class="total-amount" id="sugarDisplay">0<span class="unit">g</span></div>
            <div class="history-info" id="dateDisplay">Heute</div>
            <button class="reset-link" onclick="manualReset()">Zähler zurücksetzen</button>
        </div>
        
        <footer>
            Werte basieren auf Durchschnittsportionen.<br>
            Automatischer Reset um Mitternacht.
        </footer>
    </div>

    <script>
        let totalSugar = 0;
        let counts = {
            spread: 0,
            chocolate: 0,
            plus5: 0,
            plus10: 0,
            plus15: 0,
            plus20: 0
        };
        const displayElement = document.getElementById('sugarDisplay');

        function init() {
            loadData();
            checkMidnightReset();
            setInterval(checkMidnightReset, 30000);
            updateDateDisplay();
        }

        function addSugar(amount, type, btn) {
            checkMidnightReset();
            totalSugar += amount;
            counts[type] = (counts[type] || 0) + 1;
            
            displayElement.classList.remove('bump-anim');
            void displayElement.offsetWidth;
            displayElement.classList.add('bump-anim');
            
            updateDisplay();
            saveData();

            if (window.navigator.vibrate) {
                window.navigator.vibrate(10);
            }
        }

        function updateDisplay() {
            displayElement.innerHTML = totalSugar + '<span class="unit">g</span>';
            const ids = ['spread', 'chocolate', 'plus5', 'plus10', 'plus15', 'plus20'];
            ids.forEach(id => {
                const elem = document.getElementById('count-' + id);
                if (elem) elem.textContent = (counts[id] || 0) + 'x';
            });
        }

        function updateDateDisplay() {
            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            const dateElem = document.getElementById('dateDisplay');
            if (dateElem) dateElem.textContent = new Date().toLocaleDateString('de-DE', options);
        }

        function saveData() {
            localStorage.setItem('sugarTotal', totalSugar);
            localStorage.setItem('sugarCounts', JSON.stringify(counts));
            localStorage.setItem('lastUpdateDate', new Date().toDateString());
        }

        function loadData() {
            const savedSugar = localStorage.getItem('sugarTotal');
            if (savedSugar !== null) {
                totalSugar = parseFloat(savedSugar);
            }
            const savedCounts = localStorage.getItem('sugarCounts');
            if (savedCounts !== null) {
                try {
                    counts = JSON.parse(savedCounts);
                } catch(e) {
                    counts = { spread: 0, chocolate: 0, plus5: 0, plus10: 0, plus15: 0, plus20: 0 };
                }
            }
            updateDisplay();
        }

        function checkMidnightReset() {
            const today = new Date().toDateString();
            const savedDate = localStorage.getItem('lastUpdateDate');
            
            if (savedDate && savedDate !== today) {
                totalSugar = 0;
                counts = { spread: 0, chocolate: 0, plus5: 0, plus10: 0, plus15: 0, plus20: 0 };
                updateDisplay();
                updateDateDisplay();
                saveData();
            }
        }

        function manualReset() {
            if (confirm("Möchtest du deinen Konsum für heute wirklich auf 0 zurücksetzen?")) {
                totalSugar = 0;
                counts = { spread: 0, chocolate: 0, plus5: 0, plus10: 0, plus15: 0, plus20: 0 };
                updateDisplay();
                saveData();
            }
        }

        init();
    </script>
</body>
</html>
